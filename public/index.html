<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Attendance Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Student Attendance Management System</h1>
            <p>Manage students and track attendance efficiently</p>
        </header>

        <!-- Navigation Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('students')">Students</button>
            <button class="tab-btn" onclick="showTab('attendance')">Mark Attendance</button>
            <button class="tab-btn" onclick="showTab('report')">Monthly Report</button>
        </div>

        <!-- Students Section -->
        <div id="students" class="tab-content active">
            <div class="section">
                <h2>Add New Student</h2>
                <form id="studentForm" class="form">
                    <input type="hidden" id="studentId">
                    <div class="form-group">
                        <label for="name">Name:</label>
                        <input type="text" id="name" required>
                    </div>
                    <div class="form-group">
                        <label for="rollNumber">Roll Number:</label>
                        <input type="text" id="rollNumber" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="class">Class:</label>
                        <input type="text" id="class" required>
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone:</label>
                        <input type="tel" id="phone">
                    </div>
                    <div class="form-buttons">
                        <button type="submit" class="btn btn-primary">Add Student</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="section">
                <h2>Students List</h2>
                <div id="studentsTable"></div>
            </div>
        </div>

        <!-- Attendance Section -->
        <div id="attendance" class="tab-content">
            <div class="section">
                <h2>Mark Daily Attendance</h2>
                <div class="form-group">
                    <label for="attendanceDate">Select Date:</label>
                    <input type="date" id="attendanceDate" onchange="loadStudentsForAttendance()">
                </div>
                <div id="attendanceList"></div>
            </div>
        </div>

        <!-- Report Section -->
        <div id="report" class="tab-content">
            <div class="section">
                <h2>Monthly Attendance Report</h2>
                <div class="report-filters">
                    <div class="form-group">
                        <label for="reportYear">Year:</label>
                        <input type="number" id="reportYear" min="2020" max="2099">
                    </div>
                    <div class="form-group">
                        <label for="reportMonth">Month:</label>
                        <select id="reportMonth">
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="generateReport()">Generate Report</button>
                </div>
                <div id="reportContent"></div>
            </div>
        </div>
    </div>

    <div id="messageBox" class="message-box"></div>

    <script src="script.js"></script>
</body>
</html>
